  <style>
    :root{--ink:#241A16;--cream:#F7F0E6;--text:#2A2019;--text-soft:#5E4F44;--ember:#C1622E;--ember-deep:#9C4B22;--gold:#D9A54C;--serif:"Fraunces",Georgia,serif;--sans:"Inter",-apple-system,sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100svh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% -10%,#33251F,#1A120F 70%);color:#F7F0E6;font-family:var(--sans);text-align:center;padding:24px;}
    .box{max-width:480px;}
    .phoenix{width:70px;height:70px;margin:0 auto 22px;animation:float 3.5s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-family:var(--serif);font-weight:600;font-size:clamp(30px,6vw,44px);color:#fbf5ea;margin-bottom:14px;}
    p{color:#d9c9b4;font-size:16px;line-height:1.7;margin-bottom:26px;}
    a.btn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(180deg,var(--ember),var(--ember-deep));color:#fff;font-weight:650;font-size:15.5px;padding:14px 26px;border-radius:999px;text-decoration:none;box-shadow:0 16px 28px -14px rgba(156,75,34,.6);}
    @media (prefers-reduced-motion:reduce){.phoenix{animation:none;}}
  </style>
</head>
<body>
  <div class="box">
    <svg class="phoenix" viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M32 50c-9-4-15-12-13-24 4 6 8 9 13 10 5-1 9-4 13-10 2 12-4 20-13 24z" fill="#D9A54C"/><circle cx="32" cy="24" r="4.5" fill="#E8A15B"/></svg>
    <h1>Diese Seite hat sich gewandelt.</h1>
    <p>Wie ein Phoenix taucht manches an anderer Stelle wieder auf — diese Unterseite gibt es hier nicht (mehr). Lass uns zurück zum Anfang gehen.</p>
