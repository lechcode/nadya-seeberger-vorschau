<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Seite nicht gefunden – Nadya Seeberger</title>
  <link rel="stylesheet" href="assets/fonts.css">
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <style>
    :root{--ink:#153541;--cream:#FBF7F2;--text:#233039;--text-soft:#556570;--ember:#E15A3C;--ember-deep:#C6482B;--gold:#4F9FCD;--serif:"Schibsted Grotesk","Schibsted Grotesk Fallback",-apple-system,Arial,sans-serif;--sans:"Sora","Sora Fallback",-apple-system,Arial,sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100svh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% -10%,#1E4553,#0F2831 70%);color:#FBF7F2;font-family:var(--sans);text-align:center;padding:24px;}
    .box{max-width:480px;}
    .phoenix{width:74px;height:auto;margin:0 auto 22px;animation:float 3.5s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1{font-family:var(--serif);font-weight:600;font-size:clamp(30px,6vw,44px);color:#eef6fb;margin-bottom:14px;}
    p{color:#c4d5de;font-size:16px;line-height:1.7;margin-bottom:26px;}
    a.btn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(180deg,var(--ember),var(--ember-deep));color:#fff;font-weight:650;font-size:15.5px;padding:14px 26px;border-radius:999px;text-decoration:none;box-shadow:0 16px 28px -14px rgba(198,72,43,.55);}
    @media (prefers-reduced-motion:reduce){.phoenix{animation:none;}}
  </style>
</head>
<body>
  <div class="box">
    <img class="phoenix" src="assets/logo-phoenix-140.png" width="70" alt="" aria-hidden="true">
    <h1>Diese Seite hat sich gewandelt.</h1>
    <p>Wie ein Phoenix taucht manches an anderer Stelle wieder auf — diese Unterseite gibt es hier nicht (mehr). Lass uns zurück zum Anfang gehen.</p>
    <a class="btn" href="index.html">Zur Startseite <span aria-hidden="true">→</span></a>
  </div>
</body>
</html>
